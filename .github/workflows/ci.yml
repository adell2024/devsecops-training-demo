name: CI - Validation & Build Scratch

# CI = "est-ce que le code est bon ?" + "est-ce que l'image est saine ?"
# Se déclenche sur toute branche de travail ET sur les Pull Requests
# vers develop ou master.
#
# Ce pipeline publie une image de développement/scratch pour démo/training
# avec le tag ex: scratch-1.0.0 (non destinée à la production).

on:
  push:
    branches:
      - "feature/**"
      - "fix/**"
      - "develop"
  pull_request:
    branches:
      - "develop"
      - "master"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read

jobs:
  # ───────────────────────────────────────────────
  # JOB 1 : Sécurité & Qualité du code
  # ───────────────────────────────────────────────
  security-and-quality:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan de secrets (GitLeaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Audit des dépendances (pip-audit)
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt --desc --format=markdown

      - name: SAST Python (Bandit)
        run: |
          pip install bandit[toml]
          bandit -r app/ -f json -o bandit-report.json || true
          bandit -r app/ -ll

      - name: Lint (ruff)
        run: |
          pip install ruff
          ruff check app/ tests/
          ruff format --check app/ tests/

      - name: Tests (pytest + coverage)
        run: |
          pip install pytest pytest-cov
          pytest -v --cov=app --cov-report=xml --cov-report=term

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: github.event_name == 'pull_request'
        with:
          files: ./coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true

  # ───────────────────────────────────────────────
  # JOB 2 : Validation du Dockerfile
  # ───────────────────────────────────────────────
  dockerfile-lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint Dockerfile (Hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          format: sarif
          output-file: hadolint-results.sarif
          no-fail: false
        continue-on-error: true

      - name: Upload Hadolint SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: hadolint-results.sarif
        continue-on-error: true

  # ───────────────────────────────────────────────
  # JOB 3 : Build, Scan & Publish Scratch Image
  # ───────────────────────────────────────────────
  build-scan-publish-scratch:
    needs: [security-and-quality, dockerfile-lint]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Connexion au registre GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image local (validation + scan)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: |
            ${{ env.IMAGE_NAME }}:scan-target
          build-args: |
            APP_VERSION=scratch-1.0.0
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan de l'image (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.IMAGE_NAME }}:scan-target'
          format: 'sarif'
          output: 'trivy-results.sarif'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
        continue-on-error: true

      - name: Smoke test du conteneur
        run: |
          docker run -d --name smoke-test -p 8080:8080 ${{ env.IMAGE_NAME }}:scan-target
          echo "Attente du démarrage..."
          sleep 10
          curl -sf http://localhost:8080/health || curl -sf http://localhost:8080/ || true
          docker logs smoke-test
          docker stop smoke-test
          docker rm smoke-test
        continue-on-error: true

      - name: Build et push image scratch
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          provenance: true
          sbom: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:scratch-1.0.0
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:scratch-latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:scratch-${{ github.run_number }}-${{ github.sha }}
          build-args: |
            APP_VERSION=scratch-1.0.0
          labels: |
            org.opencontainers.image.title=${{ env.IMAGE_NAME }}
            org.opencontainers.image.description=Image scratch de démonstration/training
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=scratch-1.0.0
            org.opencontainers.image.licenses=MIT
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Signer l'image avec Cosign
        uses: sigstore/cosign-installer@v3.6.0
      - run: |
          cosign sign --yes             ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:scratch-1.0.0
          cosign sign --yes             ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:scratch-latest

      - name: Résumé de publication
        run: |
          echo "✅ Image scratch publiée :"
          echo "   ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:scratch-1.0.0"
          echo "   ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:scratch-latest"
          echo ""
          echo "⚠️  Cette image est destinée au TRAINING/DÉMO uniquement."
          echo "   Pour la production, utiliser le pipeline CD staging -> promote."

      - name: Vérifier la signature Cosign
        run: |
          cosign verify             --certificate-identity-regexp="https://github.com/${{ github.repository }}/"             --certificate-oidc-issuer="https://token.actions.githubusercontent.com"             ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:scratch-1.0.0